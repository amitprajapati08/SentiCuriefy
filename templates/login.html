<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SentiCureify — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);">

<div style="width:100%;max-width:420px;padding:1.5rem;">

  <div style="text-align:center;margin-bottom:2rem;">
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:1.2rem;color:var(--ink);text-decoration:none;">
      <div class="logo-icon">💬</div> SentiCureify
    </a>
    <p style="margin-top:0.5rem;color:var(--ink-3);font-size:0.9rem;">Sign in to your account</p>
  </div>

  {% if registered %}
  <div class="alert alert-success" style="margin-bottom:1.25rem;">
    <span class="alert-icon">✅</span> Account created! Sign in below.
  </div>
  {% endif %}

  {% if error %}
  <div class="alert alert-danger" style="margin-bottom:1.25rem;">
    <span class="alert-icon">⚠️</span> {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-input"
                 value="{{ email or '' }}"
                 placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input"
                 placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
          Sign in →
        </button>
      </form>
    </div>
  </div>

  <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--ink-3);">
    Don't have an account?
    <a href="/signup" style="color:var(--blue);font-weight:500;">Create one free</a>
  </p>

</div>
</body>
</html>
